<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { margin:0; background:#000; display:flex; gap:54px; padding:64px 48px; font-family:'Segoe UI',sans-serif; align-items:flex-start; }
  .case { display:flex; flex-direction:column; align-items:center; gap:18px; }
  h3 { color:#2dd4bf; font-size:13px; font-weight:600; letter-spacing:.14em; margin:0; }
  .big { width:128px; height:128px; }
  .titlebar { display:flex; align-items:center; gap:8px; background:linear-gradient(90deg,#000,#061712 50%,#000); padding:6px 12px; border-bottom:1px solid rgba(45,212,191,.25); border-radius:4px; }
  .titlebar svg { width:20px; height:20px; }
  .titlebar span { color:#e6fffa; font-size:13px; letter-spacing:.08em; }
  .cap { color:#7c8a87; font-size:11px; }
</style>
</head>
<body>

<!-- 案1: クラシック・グラデ球 -->
<div class="case">
  <h3>A — Gradient Orb</h3>
  <svg viewBox="0 0 100 100" class="big">
    <defs>
      <radialGradient id="a" cx="40%" cy="34%" r="78%">
        <stop offset="0%" stop-color="#7ff0dd"/>
        <stop offset="42%" stop-color="#2dd4bf"/>
        <stop offset="100%" stop-color="#a78bfa"/>
      </radialGradient>
      <filter id="ga" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3.4"/></filter>
    </defs>
    <circle cx="50" cy="50" r="34" fill="#2dd4bf" opacity="0.45" filter="url(#ga)"/>
    <circle cx="50" cy="50" r="32" fill="url(#a)"/>
    <ellipse cx="41" cy="37" rx="13" ry="7.5" fill="#fff" opacity="0.34"/>
  </svg>
  <div class="titlebar"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="32" fill="url(#a)"/><ellipse cx="41" cy="37" rx="13" ry="7.5" fill="#fff" opacity="0.34"/></svg><span>orb</span></div>
  <div class="cap">放射グラデ＋ハイライト＋グロー</div>
</div>

<!-- 案2: 軌道オーブ -->
<div class="case">
  <h3>B — Orbit</h3>
  <svg viewBox="0 0 100 100" class="big">
    <defs>
      <radialGradient id="b" cx="44%" cy="40%" r="72%">
        <stop offset="0%" stop-color="#7ff0dd"/>
        <stop offset="100%" stop-color="#12a594"/>
      </radialGradient>
      <filter id="gb" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2.2"/></filter>
    </defs>
    <ellipse cx="50" cy="50" rx="44" ry="16" fill="none" stroke="#a78bfa" stroke-width="3" opacity="0.85" transform="rotate(-24 50 50)" filter="url(#gb)"/>
    <circle cx="50" cy="50" r="23" fill="#a78bfa" opacity="0.4" filter="url(#gb)"/>
    <circle cx="50" cy="50" r="21" fill="url(#b)"/>
    <ellipse cx="44" cy="44" rx="8" ry="5" fill="#fff" opacity="0.32"/>
  </svg>
  <div class="titlebar"><svg viewBox="0 0 100 100"><ellipse cx="50" cy="50" rx="44" ry="16" fill="none" stroke="#a78bfa" stroke-width="4" opacity="0.85" transform="rotate(-24 50 50)"/><circle cx="50" cy="50" r="21" fill="url(#b)"/></svg><span>orb</span></div>
  <div class="cap">翡翠コア＋violet 軌道リング（サイバー）</div>
</div>

<!-- 案3: レイヤー・オーラ -->
<div class="case">
  <h3>C — Aura Rings</h3>
  <svg viewBox="0 0 100 100" class="big">
    <defs>
      <radialGradient id="c" cx="50%" cy="44%" r="62%">
        <stop offset="0%" stop-color="#7ff0dd"/>
        <stop offset="58%" stop-color="#2dd4bf"/>
        <stop offset="100%" stop-color="#7c5cfa"/>
      </radialGradient>
      <filter id="gc" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2"/></filter>
    </defs>
    <circle cx="50" cy="50" r="37" fill="none" stroke="#a78bfa" stroke-width="1.6" opacity="0.38"/>
    <circle cx="50" cy="50" r="30.5" fill="none" stroke="#2dd4bf" stroke-width="1.6" opacity="0.55" filter="url(#gc)"/>
    <circle cx="50" cy="50" r="24" fill="url(#c)"/>
    <circle cx="43" cy="42" r="5.5" fill="#fff" opacity="0.4"/>
  </svg>
  <div class="titlebar"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="36" fill="none" stroke="#a78bfa" stroke-width="2.4" opacity="0.4"/><circle cx="50" cy="50" r="24" fill="url(#c)"/></svg><span>orb</span></div>
  <div class="cap">同心オーラ環＋コアグロー（深み）</div>
</div>

</body>
</html>
